version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: pixel-db
    restart: unless-stopped
    env_file:
      - .env
      - .env.local
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"                 # пробросим для доступа с хоста (опционально)

  meilisearch:
    image: getmeili/meilisearch:v1.13
    container_name: pixel-meili
    restart: unless-stopped
    env_file:
      - .env
      - .env.local
    volumes:
      - meili_data:/meili_data
    ports:
      - "7700:7700"                 # чтобы можно было зайти веб-интерфейс или для разработки

  nextjs:
    build: .
    container_name: pixel-nextjs
    restart: unless-stopped
    env_file:
      - .env
      - .env.local
    depends_on:
      - db
      - meilisearch

  nginx:
    image: nginx:stable-alpine
    container_name: pixel-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    #      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    #      - ./certbot/conf:/etc/letsencrypt
    #      - ./certbot/www:/var/www/certbot
    depends_on:
      - nextjs
#
#  certbot:
#    image: certbot/certbot
#    container_name: pixel-certbot
#    restart: unless-stopped
#    volumes:
#      - ./certbot/conf:/etc/letsencrypt
#      - ./certbot/www:/var/www/certbot
#    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew; done'"

volumes:
  pgdata:
  meili_data: